<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 180px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f9f9f9;
    }
    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 10px 0;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      background: #db4e54;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background: #eeabaf;
    }
    select {
      width: 100%;
      padding: 8px;
      margin: 6px 0 12px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e33f46;
    }
    h3 {
      text-align: center;
      margin: 0 0 14px 0;
      color: #d9383c;
      font-size: 16px;
    }
    option{
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>CRM Automator v3  </h3>

  <button id="page1">Page 1</button>
  <button id="page2">Page 2</button>
  <button id="next">Activate</button>
